name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            apt: ''
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            apt: musl-tools
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            archive: tar.gz
            apt: ''
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
            apt: ''
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            apt: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            apt: ''
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
            apt: ''

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install apt packages
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust target
        shell: bash
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked -p kgr --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          STAGING="kgr-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/kgr" "$STAGING/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${STAGING}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = "kgr-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kgr.exe" -Destination $staging
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE -Destination $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$staging.zip").Hash.ToLower()
          "$hash  $staging.zip" | Out-File -FilePath "$staging.zip.sha256" -Encoding ascii -NoNewline
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CHECKSUM=$staging.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
          fail_on_unmatched_files: true
          generate_release_notes: true
